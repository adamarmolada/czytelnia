const { useState, useEffect, useRef, useCallback } = React;


/* ---------------------------------------------------------------
   CZYTELNIA — osobisty słownik czytelnika  ·  motyw: BRAT
   Jeden wątek = jedna książka czytana po angielsku.
   Dyktujesz słowo → dostajesz hasło słownikowe po polsku
   wraz ze zdaniem źródłowym (lub przykładowym).
----------------------------------------------------------------*/

const C = {
  paper: "#F2F6E6",    // blada limonkowa poświata — powierzchnia czytania (łagodna dla oka)
  paperDeep: "#E9F0D6",
  ink: "#0B0B0A",      // brat black
  inkSoft: "#56604A",
  shelf: "#8ACE00",    // BRAT lime — półka z książkami
  shelfSoft: "#7BB900",
  shelfText: "#0B0B0A",
  shelfMute: "#33420C",
  lime: "#8ACE00",
  limeDeep: "#6FA800",
  olive: "#3E5400",    // ciemna oliwka — dobry kontrast na jasnym tle
  line: "#D2DEB6",
  danger: "#C2381F",
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- trwała pamięć (best-effort) ---------- */
const store = {
  get(key) { try { const v = localStorage.getItem("czyt:" + key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem("czyt:" + key, JSON.stringify(val)); } catch {} },
  del(key) { try { localStorage.removeItem("czyt:" + key); } catch {} },
};

/* ---------- tłumaczenie: darmowe, publiczne usługi (bez API Claude) ----------
   - tłumaczenie EN→PL: MyMemory (z fallbackiem na publiczny endpoint Google)
   - wymowa / część mowy / przykładowe zdanie: dictionaryapi.dev          */

async function viaMyMemory(text) {
  const url = "https://api.mymemory.translated.net/get?q=" +
    encodeURIComponent(text) + "&langpair=en|pl";
  const r = await fetch(url);
  if (!r.ok) throw new Error("mymemory http " + r.status);
  const d = await r.json();
  const t = d && d.responseData && d.responseData.translatedText;
  if (!t || /MYMEMORY WARNING|INVALID|PLEASE SELECT/i.test(t)) throw new Error("mymemory empty");
  return decodeHtml(t.trim());
}

async function viaGoogle(text) {
  const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pl&dt=t&q=" +
    encodeURIComponent(text);
  const r = await fetch(url);
  if (!r.ok) throw new Error("google http " + r.status);
  const d = await r.json();
  if (!Array.isArray(d) || !Array.isArray(d[0])) throw new Error("google shape");
  return d[0].map((seg) => (seg && seg[0]) || "").join("").trim();
}

async function translate(text) {
  if (!text || !text.trim()) return "";
  try { return await viaMyMemory(text); }
  catch (e1) {
    try { return await viaGoogle(text); }
    catch (e2) { throw new Error("translate-failed"); }
  }
}

function decodeHtml(s) {
  return s.replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&amp;/g, "&")
          .replace(/&lt;/g, "<").replace(/&gt;/g, ">");
}

const POS_PL = {
  noun: "rzeczownik", verb: "czasownik", adjective: "przymiotnik", adverb: "przysłówek",
  pronoun: "zaimek", preposition: "przyimek", conjunction: "spójnik", interjection: "wykrzyknik",
  exclamation: "wykrzyknik", determiner: "określnik", article: "przedimek", numeral: "liczebnik",
};

async function fetchDict(word) {
  try {
    const r = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" +
      encodeURIComponent(word.toLowerCase().trim()));
    if (!r.ok) return {};
    const d = await r.json();
    const entry = Array.isArray(d) ? d[0] : null;
    if (!entry) return {};
    let ipa = entry.phonetic || "";
    if (!ipa && Array.isArray(entry.phonetics)) {
      const p = entry.phonetics.find((x) => x && x.text);
      if (p) ipa = p.text;
    }
    const pos = entry.meanings && entry.meanings[0] ? entry.meanings[0].partOfSpeech : "";
    let example = "";
    for (const m of entry.meanings || []) {
      for (const def of m.definitions || []) {
        if (def.example) { example = def.example; break; }
      }
      if (example) break;
    }
    let audio = "";
    if (Array.isArray(entry.phonetics)) {
      const withAudio = entry.phonetics.filter((p) => p && p.audio);
      const us = withAudio.find((p) => /-us\.mp3$/i.test(p.audio));
      const uk = withAudio.find((p) => /-uk\.mp3$/i.test(p.audio));
      audio = (us || uk || withAudio[0] || {}).audio || "";
    }
    return { ipa, pos, example, audio };
  } catch { return {}; }
}

async function lookupWord({ word, sentence }) {
  const hasSentence = sentence && sentence.trim().length > 0;
  const clean = word.trim();

  // równolegle: słownik (IPA/część mowy/przykład) + tłumaczenie samego słowa
  const [dict, pl] = await Promise.all([fetchDict(clean), translate(clean)]);

  // zdanie źródłowe: od użytkownika, inaczej przykład ze słownika
  const src = hasSentence ? sentence.trim() : (dict.example || "");
  let sentencePl = "";
  if (src) { try { sentencePl = await translate(src); } catch { sentencePl = ""; } }

  return {
    id: uid(),
    word: clean,
    queried: clean,
    ipa: dict.ipa || "",
    pos: dict.pos ? (POS_PL[dict.pos] || dict.pos) : "",
    pl: pl,
    note: "",
    sentence: src,
    sentencePl,
    audio: dict.audio || "",
    fromBook: !!hasSentence,
    createdAt: Date.now(),
  };
}

/* ---------- odtwarzanie wymowy ----------
   1) nagranie native speakera ze słownika (jeśli jest)
   2) endpoint TTS Google Translate
   3) wbudowany syntezator mowy przeglądarki (zawsze działa, offline) */
function googleTtsUrl(word) {
  return "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=" +
    encodeURIComponent(word);
}
function speakBrowser(word, done) {
  try {
    const synth = window.speechSynthesis;
    if (!synth) { done && done(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = "en-US";
    const voices = synth.getVoices() || [];
    const v = voices.find((x) => /^en[-_]/i.test(x.lang)) || voices.find((x) => /en/i.test(x.lang));
    if (v) u.voice = v;
    u.onend = () => done && done();
    u.onerror = () => done && done();
    synth.speak(u);
  } catch { done && done(); }
}
function playPronunciation(entry, done) {
  const sources = [];
  if (entry.audio) sources.push(entry.audio);
  sources.push(googleTtsUrl(entry.word));
  let i = 0;
  const tryNext = () => {
    if (i >= sources.length) { speakBrowser(entry.word, done); return; }
    const a = new Audio(sources[i++]);
    a.onended = () => done && done();
    a.onerror = () => tryNext();
    const p = a.play();
    if (p && p.catch) p.catch(() => tryNext());
  };
  tryNext();
}

/* ---------- podświetlenie szukanego słowa w zdaniu ----------
   Naprawione: bez współdzielonego, "stanowego" globalnego regexu
   (poprzednia wersja używała re.test() na globalnym /ig/, co dawało
   niestabilne wyniki przy każdym wywołaniu). */
function Highlight({ text, word }) {
  if (!text) return null;
  const w = (word || "").trim();
  if (!w) return <>{text}</>;
  try {
    const esc = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(`(${esc}\\w*)`, "ig");
    const parts = text.split(re);
    const lw = w.toLowerCase();
    return (
      <>
        {parts.map((p, i) =>
          p && p.toLowerCase().startsWith(lw)
            ? <span key={i} className="lex-mark">{p}</span>
            : <span key={i}>{p}</span>
        )}
      </>
    );
  } catch {
    return <>{text}</>;
  }
}

/* ---------- pojedyncze hasło ---------- */
function Entry({ e, onDelete }) {
  const [playing, setPlaying] = useState(false);
  const speak = () => {
    if (playing) return;
    setPlaying(true);
    playPronunciation(e, () => setPlaying(false));
  };
  return (
    <article className="lex-entry" style={{ padding: "22px 2px", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <h3 style={{ margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: "-.02em" }}>{e.word}</h3>
        {e.ipa && <span style={{ fontSize: 13.5, color: C.inkSoft }}>{e.ipa}</span>}
        {e.pos && <span style={{ fontSize: 14, color: C.olive, fontWeight: 700 }}>{e.pos.toLowerCase()}</span>}
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={speak} aria-label="posłuchaj wymowy" title="posłuchaj wymowy"
            className={"lex-spk" + (playing ? " playing" : "")}
            style={{ width: 36, height: 36, flexShrink: 0, border: "none", borderRadius: 10, background: C.lime, color: C.ink, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 9v6h4l5 4V5L7 9H3z" /><path d="M16.5 8.5a5 5 0 0 1 0 7" /><path d="M19.5 6a8 8 0 0 1 0 12" />
            </svg>
          </button>
          <button onClick={() => onDelete(e.id)} aria-label="usuń hasło" className="lex-icon-btn"
            style={{ border: "none", background: "transparent", color: C.inkSoft, opacity: .45, fontSize: 13, padding: 4, cursor: "pointer" }}>usuń</button>
        </div>
      </div>

      <p style={{ margin: "6px 0 0", fontSize: 21, fontWeight: 500, color: C.ink }}>{e.pl}</p>
      {e.note && <p style={{ margin: "4px 0 0", fontSize: 13.5, color: C.inkSoft, lineHeight: 1.5 }}>{e.note}</p>}

      {e.sentence && (
        <div style={{ marginTop: 14, borderLeft: `3px solid ${C.lime}`, paddingLeft: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <span style={{ width: 7, height: 7, borderRadius: 7, background: e.fromBook ? C.lime : "#A7B190" }} />
            <span style={{ fontSize: 11, letterSpacing: ".08em", textTransform: "lowercase", color: C.inkSoft, fontWeight: 700 }}>
              {e.fromBook ? "z książki" : "przykład"}
            </span>
          </div>
          <p style={{ margin: 0, fontStyle: "italic", fontSize: 16.5, lineHeight: 1.55, color: C.ink }}>
            <Highlight text={e.sentence} word={e.queried} />
          </p>
          {e.sentencePl && <p style={{ margin: "6px 0 0", fontSize: 14.5, lineHeight: 1.55, color: C.inkSoft }}>{e.sentencePl}</p>}
        </div>
      )}
    </article>
  );
}

function App() {
  const [index, setIndex] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [entries, setEntries] = useState([]);
  const [loadingLib, setLoadingLib] = useState(true);

  const [word, setWord] = useState("");
  const [sentence, setSentence] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [addingBook, setAddingBook] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newAuthor, setNewAuthor] = useState("");
  const [query, setQuery] = useState("");

  const scrollRef = useRef(null);
  const wordRef = useRef(null);
  const sentenceRef = useRef(null);

  useEffect(() => {
    (async () => {
      const idx = (await store.get("index")) || [];
      setIndex(idx);
      if (idx.length) setActiveId(idx[0].id);
      setLoadingLib(false);
    })();
  }, []);

  useEffect(() => {
    if (!activeId) { setEntries([]); return; }
    (async () => {
      const b = await store.get("book:" + activeId);
      setEntries((b && b.entries) || []);
    })();
  }, [activeId]);

  useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [entries.length, busy]);

  const activeBook = index.find((b) => b.id === activeId) || null;

  const persistEntries = useCallback(async (id, list) => {
    await store.set("book:" + id, { entries: list });
  }, []);

  const addBook = async () => {
    const t = newTitle.trim();
    if (!t) return;
    const b = { id: uid(), title: t, author: newAuthor.trim(), createdAt: Date.now() };
    const idx = [b, ...index];
    setIndex(idx); await store.set("index", idx);
    await store.set("book:" + b.id, { entries: [] });
    setActiveId(b.id); setEntries([]);
    setNewTitle(""); setNewAuthor(""); setAddingBook(false); setSidebarOpen(false);
  };

  const deleteBook = async (id) => {
    if (!window.confirm("Usunąć tę książkę i wszystkie zapisane słowa?")) return;
    const idx = index.filter((b) => b.id !== id);
    setIndex(idx); await store.set("index", idx); await store.del("book:" + id);
    if (activeId === id) setActiveId(idx[0]?.id || null);
  };

  const submit = async () => {
    const w = word.trim();
    if (!w || !activeId || busy) return;
    setBusy(true); setError("");
    try {
      const entry = await lookupWord({ word: w, sentence });
      const list = [...entries, entry];
      setEntries(list);
      await persistEntries(activeId, list);
      setWord(""); setSentence("");
      wordRef.current?.focus();
    } catch (err) {
      console.error(err);
      setError("Nie udało się pobrać tłumaczenia. Usługa tłumaczeń może być chwilowo niedostępna albo słowa nie ma w bazie — spróbuj ponownie lub dopisz zdanie.");
    } finally {
      setBusy(false);
    }
  };

  const deleteEntry = async (eid) => {
    const list = entries.filter((e) => e.id !== eid);
    setEntries(list);
    await persistEntries(activeId, list);
  };

  const onWordKey = (ev) => {
    if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); submit(); }
  };

  const filtered = query.trim()
    ? entries.filter((e) => (e.word + " " + e.pl).toLowerCase().includes(query.trim().toLowerCase()))
    : entries;

  const countLabel = (n) => (n === 1 ? "słowo" : n >= 2 && n <= 4 ? "słowa" : "słów");

  return (
    <div className="lex-root" style={{ height: "100vh", display: "flex", background: C.paper, overflow: "hidden" }}>
      <style>{CSS}</style>

      {sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)} className="lex-overlay"
          style={{ position: "fixed", inset: 0, background: "#0007", zIndex: 30 }} />
      )}

      {/* ---------- PÓŁKA (książki) ---------- */}
      <aside className={"lex-aside lex-shelf-scroll" + (sidebarOpen ? " open" : "")}
        style={{ width: 280, flexShrink: 0, background: C.shelf, color: C.shelfText, display: "flex", flexDirection: "column", overflowY: "auto", zIndex: 40 }}>
        <div style={{ padding: "22px 20px 14px" }}>
          <div style={{ fontSize: 30, fontWeight: 900, letterSpacing: "-.04em", lineHeight: 1 }}>czytelnia</div>
          <div style={{ fontSize: 12, color: C.shelfMute, marginTop: 4, fontWeight: 700 }}>twój słownik czytelnika</div>
        </div>

        <div style={{ padding: "0 12px 12px", flex: 1 }}>
          <div style={{ fontSize: 11, color: C.shelfMute, padding: "8px 8px 6px", letterSpacing: ".1em", textTransform: "lowercase", fontWeight: 700 }}>książki</div>
          {index.map((b) => {
            const on = b.id === activeId;
            return (
              <div key={b.id} className="lex-book-btn"
                onClick={() => { setActiveId(b.id); setSidebarOpen(false); setQuery(""); }}
                style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "10px", borderRadius: 8, cursor: "pointer", marginBottom: 2, background: on ? C.shelfSoft : "transparent", borderLeft: `3px solid ${on ? C.ink : "transparent"}` }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.25, color: C.shelfText, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.title}</div>
                  {b.author && <div style={{ fontSize: 12, color: C.shelfMute, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.author}</div>}
                </div>
                <button onClick={(ev) => { ev.stopPropagation(); deleteBook(b.id); }} aria-label="usuń książkę" className="lex-icon-btn"
                  style={{ border: "none", background: "transparent", color: C.shelfMute, opacity: .6, fontSize: 17, lineHeight: 1, padding: 2 }}>×</button>
              </div>
            );
          })}
          {!loadingLib && index.length === 0 && (
            <div style={{ padding: "12px 8px", fontSize: 13, color: C.shelfMute, lineHeight: 1.5, fontWeight: 500 }}>
              brak książek. dodaj pierwszą, żeby zacząć zbierać słowa.
            </div>
          )}
        </div>

        <div style={{ padding: 12, borderTop: `1px solid ${C.shelfSoft}` }}>
          {addingBook ? (
            <div>
              <input className="lex-in" autoFocus value={newTitle} onChange={(e) => setNewTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addBook()}
                placeholder="tytuł książki" style={{ width: "100%", marginBottom: 6, padding: "9px 10px", borderRadius: 7, border: `1px solid ${C.shelfSoft}`, background: "#fff", color: C.ink, fontSize: 14 }} />
              <input className="lex-in" value={newAuthor} onChange={(e) => setNewAuthor(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addBook()}
                placeholder="autor (opcjonalnie)" style={{ width: "100%", marginBottom: 8, padding: "9px 10px", borderRadius: 7, border: `1px solid ${C.shelfSoft}`, background: "#fff", color: C.ink, fontSize: 14 }} />
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={addBook} className="lex-primary" style={{ flex: 1, padding: "9px", borderRadius: 7, border: "none", background: C.ink, color: C.lime, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>dodaj</button>
                <button onClick={() => { setAddingBook(false); setNewTitle(""); setNewAuthor(""); }} style={{ padding: "9px 12px", borderRadius: 7, border: `1px solid ${C.ink}`, background: "transparent", color: C.ink, fontSize: 14, cursor: "pointer", fontWeight: 700 }}>anuluj</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAddingBook(true)} className="lex-book-btn"
              style={{ width: "100%", padding: "11px", borderRadius: 8, border: `1px dashed ${C.ink}`, background: "transparent", color: C.ink, fontSize: 14, cursor: "pointer", textAlign: "left", fontWeight: 700 }}>
              + nowa książka
            </button>
          )}
        </div>
      </aside>

      {/* ---------- GŁÓWNY PANEL ---------- */}
      <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <header style={{ display: "flex", alignItems: "center", gap: 12, padding: "16px 20px", borderBottom: `1px solid ${C.line}`, background: C.paper }}>
          <button onClick={() => setSidebarOpen(true)} aria-label="pokaż książki" className="lex-icon-btn lex-menu"
            style={{ border: "none", background: "transparent", color: C.ink, fontSize: 20, padding: 4, alignItems: "center" }}>☰</button>
          <div style={{ flex: 1, minWidth: 0 }}>
            {activeBook ? (
              <>
                <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: "-.02em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{activeBook.title}</h1>
                <div style={{ fontSize: 12, color: C.inkSoft, marginTop: 2, fontWeight: 600 }}>
                  {activeBook.author ? activeBook.author + " · " : ""}{entries.length} {countLabel(entries.length)}
                </div>
              </>
            ) : (
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, letterSpacing: "-.03em" }}>czytelnia</h1>
            )}
          </div>
          {activeBook && entries.length > 0 && (
            <input className="lex-in" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="szukaj słowa…"
              style={{ width: 150, padding: "8px 11px", borderRadius: 8, border: `1px solid ${C.line}`, background: "#fff", color: C.ink, fontSize: 13.5 }} />
          )}
        </header>

        <div ref={scrollRef} className="lex-scroll" style={{ flex: 1, overflowY: "auto", padding: "8px 24px" }}>
          {!activeBook ? (
            <Empty kind="nobook" onAdd={() => { setSidebarOpen(true); setAddingBook(true); }} />
          ) : filtered.length === 0 ? (
            <Empty kind={query ? "nofind" : "nowords"} />
          ) : (
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              {filtered.map((e) => <Entry key={e.id} e={e} onDelete={deleteEntry} />)}
              {busy && (
                <div style={{ padding: "22px 2px", color: C.inkSoft }}>
                  <span style={{ fontStyle: "italic", fontSize: 17 }}>tłumaczę</span>
                  <span className="lex-dots" style={{ marginLeft: 2 }}><span>.</span><span>.</span><span>.</span></span>
                </div>
              )}
            </div>
          )}
        </div>

        {activeBook && (
          <div style={{ borderTop: `1px solid ${C.line}`, background: C.paperDeep, padding: "14px 24px 18px" }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              {error && <div style={{ marginBottom: 10, fontSize: 13, color: C.danger, fontWeight: 600 }}>{error}</div>}

              <div className="lex-composer" style={{ padding: "14px 16px" }}>
                <div className="lex-chip" style={{ marginBottom: 7 }}>en → pl</div>
                <input ref={wordRef} value={word} onChange={(e) => setWord(e.target.value)} onKeyDown={onWordKey}
                  placeholder="słowo po angielsku" className="lex-bare" autoComplete="off" autoCapitalize="none" autoCorrect="off" spellCheck={false} enterKeyHint="go"
                  style={{ fontSize: 19, fontWeight: 700, padding: "4px 0" }} />

                <textarea ref={sentenceRef} value={sentence} onChange={(e) => setSentence(e.target.value)} onKeyDown={onWordKey}
                  placeholder="zdanie z książki — opcjonalnie, dla dokładnego tłumaczenia"
                  className="lex-bare" enterKeyHint="send"
                  style={{ width: "100%", marginTop: 12, fontSize: 16, lineHeight: 1.6, padding: "13px 14px", minHeight: 140, resize: "vertical", background: "#F6F8EE", border: `1px solid ${C.line}`, borderRadius: 12, fontStyle: sentence ? "italic" : "normal", color: C.ink }} />

                <button onClick={submit} disabled={!word.trim() || busy} className="lex-send"
                  style={{ width: "100%", height: 52, marginTop: 12, borderRadius: 14, border: "none", background: C.lime, color: C.ink, fontSize: 16.5, fontWeight: 800, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                  {busy ? "tłumaczę…" : <>tłumacz <span style={{ fontSize: 19, lineHeight: 1, marginTop: -1 }}>→</span></>}
                </button>
              </div>

              <div style={{ marginTop: 8, padding: "0 4px", fontSize: 11.5, color: C.inkSoft, opacity: .85, fontWeight: 600 }}>
                ↵ tłumaczy &nbsp;·&nbsp; ⇧↵ nowa linia w zdaniu &nbsp;·&nbsp; 🔊 wymowa po dodaniu
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

function Empty({ kind, onAdd }) {
  const map = {
    nobook: { t: "zacznij od książki", d: "każda książka to osobny wątek. dodaj tytuł, który właśnie czytasz po angielsku, i zacznij zbierać słowa.", btn: "dodaj książkę" },
    nowords: { t: "pusta strona czeka", d: "podyktuj na dole pierwsze słowo. dostaniesz tłumaczenie i zdanie, z którego pochodzi.", btn: null },
    nofind: { t: "nic nie znaleziono", d: "żadne zapisane słowo nie pasuje do wyszukiwania.", btn: null },
  };
  const m = map[kind];
  return (
    <div style={{ maxWidth: 460, margin: "12% auto 0", textAlign: "center", padding: 24 }}>
      <div style={{ fontSize: 28, fontWeight: 900, letterSpacing: "-.03em", color: C.ink, marginBottom: 10 }}>{m.t}</div>
      <p style={{ fontSize: 15, color: C.inkSoft, lineHeight: 1.6, margin: 0, fontWeight: 500 }}>{m.d}</p>
      {m.btn && (
        <button onClick={onAdd} className="lex-primary"
          style={{ marginTop: 18, padding: "11px 22px", borderRadius: 9, border: "none", background: C.lime, color: C.ink, fontSize: 15, fontWeight: 800, cursor: "pointer" }}>{m.btn}</button>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
